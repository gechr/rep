version: 2

updates:
  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns:
          - "*"
    ignore:
      - dependency-name: convert_case
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
