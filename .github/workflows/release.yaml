name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions: {}

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    # @clover
    uses: gechr/actions/.github/workflows/release.yaml@b670f2c89a30f7ab050bcffbf2177459ca63520b # v0.2.8
    secrets:
      RELEASER_APP_PRIVATE_KEY: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
    with:
      language: rust
      name: rep
      desc: "Fast find-and-replace tool"
