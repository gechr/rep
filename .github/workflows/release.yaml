name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions: {}

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    uses: gechr/actions/.github/workflows/release.yaml@9b9d051d433bfeb57bf7f88c65c41ae3cb23e000 # v0.2.7
    secrets:
      RELEASER_APP_PRIVATE_KEY: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
    with:
      language: rust
      name: rep
      desc: "Fast find-and-replace tool"
