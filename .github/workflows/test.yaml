name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    uses: gechr/actions/.github/workflows/test.yaml@b670f2c89a30f7ab050bcffbf2177459ca63520b # v0.2.8
    with:
      language: rust
