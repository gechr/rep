name: zizmor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: gechr/actions/.github/workflows/zizmor.yaml@24aa7833c41452ff05697bdf2dd48f023bcdf33b # v0.2.5
