name: zizmor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    permissions:
      contents: read
      actions: read
      security-events: write
    # @clover
    uses: gechr/actions/.github/workflows/zizmor.yaml@b670f2c89a30f7ab050bcffbf2177459ca63520b # v0.2.8
